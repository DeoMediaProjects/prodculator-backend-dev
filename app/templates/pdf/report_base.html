<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Prodculator Report</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 24px;
        color: #111;
      }
      h1, h2 {
        margin-bottom: 8px;
      }
      .muted {
        color: #555;
      }
      pre {
        white-space: pre-wrap;
        word-wrap: break-word;
        background: #f5f5f5;
        border: 1px solid #ddd;
        padding: 12px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <h1>Prodculator Report</h1>
    <p class="muted">Generated server-side.</p>
    <h2>{{ report.scriptTitle or report.script_title or "Untitled" }}</h2>
    <pre>{{ report | tojson(indent=2) }}</pre>
  </body>
</html>
