name: CI

# Quality gate: lint + tests must pass on every PR and on pushes to main.
# Deploy (deploy.yml) re-runs these as a `test` job and only ships if they pass.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # WeasyPrint needs these native libs at import time (mirrors the Dockerfile).
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libcairo2 libffi-dev libgdk-pixbuf-2.0-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Tests (pytest)
        run: pytest -q
