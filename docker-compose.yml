services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DB_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-prodculator}
      REDIS_URL: redis://redis:6379/0
      BACKEND_URL: http://localhost:${BACKEND_PORT:-8001}
      # Route report generation onto the durable RQ queue (processed by `worker`).
      REPORT_QUEUE_ENABLED: "true"
      # AWS S3 credentials are loaded from .env — no local storage volume needed
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m app.worker
    env_file:
      - .env
    environment:
      DB_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-prodculator}
      REDIS_URL: redis://redis:6379/0
      REPORT_QUEUE_ENABLED: "true"
      # The worker owns background jobs only — keep the API's startup side effects
      # (scraper seeding, APScheduler) out of this process.
      SCRAPER_ENABLED: "false"
      SCHEDULER_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      # Host 5433 — a host-installed PostgreSQL 18 shadows 5432 on this
      # machine, which repeatedly sent migrations/seeds to the wrong server.
      # From the host, the CONTAINER database is always localhost:5433.
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
